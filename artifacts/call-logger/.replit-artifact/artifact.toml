kind = "data-app"
previewPath = "/"
title = "Pacific Systems Call Logger"
version = "1.0.0"
id = "artifacts/call-logger"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24877

[services.development]
run = "pnpm --filter @workspace/call-logger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/call-logger", "run", "build" ]
publicDir = "artifacts/call-logger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24877"
BASE_PATH = "/"
